<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GRAVITY · Solar System Model</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Roboto+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/style.css" />
    <!-- Critical, inlined so the loader paints instantly — before /src/style.css
         or the module graph have loaded. Removed by main.ts on the first frame. -->
    <style>
      #preloader {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 34px; background: #05070d; transition: opacity 0.6s ease;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      #preloader.hidden { opacity: 0; pointer-events: none; }
      #preloader .orbit { position: relative; width: 120px; height: 120px; }
      #preloader .ring { position: absolute; inset: 0; border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 50%; }
      #preloader .sun {
        position: absolute; top: 50%; left: 50%; width: 26px; height: 26px; margin: -13px; border-radius: 50%;
        background: radial-gradient(circle at 40% 35%, #fff, #ffb74d 45%, #e8731a 100%);
        box-shadow: 0 0 24px 6px rgba(255, 150, 40, 0.55);
      }
      #preloader .planet { position: absolute; top: 50%; left: 50%; width: 120px; height: 120px; margin: -60px; animation: pl-spin 1.6s linear infinite; }
      #preloader .planet::before {
        content: ''; position: absolute; top: -4px; left: 50%; width: 9px; height: 9px; margin-left: -4.5px; border-radius: 50%;
        background: #7fb4ff; box-shadow: 0 0 10px 2px rgba(120, 170, 255, 0.6);
      }
      @keyframes pl-spin { to { transform: rotate(360deg); } }
      #preloader .brand { font-size: 13px; letter-spacing: 0.55em; text-indent: 0.55em; color: #cdd6e6; font-weight: 500; animation: pl-pulse 1.8s ease-in-out infinite; }
      @keyframes pl-pulse { 0%, 100% { opacity: 0.45; } 50% { opacity: 1; } }
    </style>
  </head>
  <body>
    <div id="preloader">
      <div class="orbit">
        <div class="ring"></div>
        <div class="planet"></div>
        <div class="sun"></div>
      </div>
      <div class="brand">GRAVITY</div>
    </div>
    <button id="music-toggle" class="music-toggle" type="button" aria-label="Toggle background music" aria-pressed="false" title="Background music" hidden>
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M6 11.5V4.2l6-1.4v6.6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="4.3" cy="11.5" r="1.7" stroke="currentColor" stroke-width="1.3"/>
        <circle cx="10.3" cy="9.4" r="1.7" stroke="currentColor" stroke-width="1.3"/>
      </svg>
    </button>
    <div id="app"></div>
    <canvas id="scene"></canvas>
    <div class="credit credit-left">
      Made by
      <a href="https://github.com/qunabu/Gravity" target="_blank" rel="noopener noreferrer">qunabu</a>
    </div>
    <div class="credit">
      Earth texture
      <a href="https://www.solarsystemscope.com/textures/" target="_blank" rel="noopener noreferrer">Solar System Scope</a>
      · CC BY 4.0
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
